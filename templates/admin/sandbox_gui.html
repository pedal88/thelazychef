{% extends "base.html" %}

{% block title %}Media Hub - Sandbox{% endblock %}

{% block content %}
<div class="h-full bg-slate-50 border-t border-slate-200 py-6 min-h-screen">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Controls & Fragments -->
            <div class="lg:col-span-6 flex flex-col gap-6">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6">
                        <!-- Sandbox Controls -->
                        <div class="mb-6 flex flex-col gap-4 bg-slate-50 p-4 rounded-lg border border-slate-200">
                            <!-- Config Row -->
                            <div class="flex flex-col gap-4">
                                <div class="w-full">
                                    <label
                                        class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Recipe
                                        ID</label>
                                    <input type="number" id="sandbox-recipe-id" value="192"
                                        class="w-full rounded-md border-0 py-1 px-3 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-orange-600">
                                </div>
                                <div class="w-full">
                                    <label
                                        class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Theme</label>
                                    <select id="sandbox-theme"
                                        class="w-full rounded-md border-0 py-1 px-3 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-orange-600">
                                        <option value="modern">Modern (Dark / High Contrast)</option>
                                        <option value="classic">Classic (Light / Cream)</option>
                                    </select>
                                </div>
                                <div class="flex items-center gap-2 mt-2 ml-1">
                                    <input type="checkbox" id="sandbox-debug" checked
                                        class="h-4 w-4 rounded border-gray-300 text-orange-600 focus:ring-orange-600">
                                    <label for="sandbox-debug"
                                        class="text-sm font-medium text-slate-700 cursor-pointer">Show Safe
                                        Zones</label>
                                </div>
                            </div>
                        </div>

                        <!-- Fragment List (Grid) -->
                        <div class="grid grid-cols-2 gap-3">
                            <!-- Hero -->
                            <a href="javascript:void(0)" onclick="openSandbox('hero')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 bg-white hover:border-orange-300 hover:bg-orange-50 hover:text-orange-700 transition-all shadow-sm">
                                <span class="text-xl">🖼️</span>
                                <span class="font-semibold text-sm">Hero</span>
                            </a>
                            <!-- Meta -->
                            <a href="javascript:void(0)" onclick="openSandbox('meta')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 bg-white hover:border-blue-300 hover:bg-blue-50 hover:text-blue-700 transition-all shadow-sm">
                                <span class="text-xl">⏱️</span>
                                <span class="font-semibold text-sm">Details</span>
                            </a>
                            <!-- Ingredients -->
                            <a href="javascript:void(0)" onclick="openSandbox('ingredients')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 bg-white hover:border-green-300 hover:bg-green-50 hover:text-green-700 transition-all shadow-sm">
                                <span class="text-xl">🥦</span>
                                <span class="font-semibold text-sm">Ingredients</span>
                            </a>
                            <!-- Steps -->
                            <a href="javascript:void(0)" onclick="openSandbox('steps')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 bg-white hover:border-purple-300 hover:bg-purple-50 hover:text-purple-700 transition-all shadow-sm">
                                <span class="text-xl">📝</span>
                                <span class="font-semibold text-sm">Instructions</span>
                            </a>
                            <!-- Nutrition -->
                            <a href="javascript:void(0)" onclick="openSandbox('nutrition')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 bg-white hover:border-rose-300 hover:bg-rose-50 hover:text-rose-700 transition-all shadow-sm">
                                <span class="text-xl">🔥</span>
                                <span class="font-semibold text-sm">Nutrition</span>
                            </a>
                            <!-- Galaxy -->
                            <a href="javascript:void(0)" onclick="openSandbox('galaxy')"
                                class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 bg-white hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-all shadow-sm">
                                <span class="text-xl">🌌</span>
                                <span class="font-semibold text-sm">Galaxy</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Preview Iframe -->
            <div class="lg:col-span-6 flex flex-col">
                <div id="sandbox-empty-state"
                    class="flex-1 min-h-[85vh] flex items-center justify-center border-2 border-dashed border-slate-300 rounded-3xl bg-slate-100/50">
                    <div class="text-center text-slate-400">
                        <span class="text-5xl block mb-4">📱</span>
                        <p class="font-medium text-lg">Select a fragment to preview</p>
                    </div>
                </div>

                <!-- Hidden Iframe Container for inline previewing -->
                <div id="sandbox-preview-container"
                    class="bg-slate-900 rounded-3xl overflow-hidden shadow-2xl relative border-8 border-slate-800 hidden flex-1 min-h-[85vh]">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none"
                        id="iframe-loader">
                        <span class="text-white opacity-50 flex items-center gap-2"><svg class="animate-spin h-5 w-5"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4">
                                </circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg> Loading Preview...</span>
                    </div>
                    <iframe id="sandbox-frame" class="w-full h-full border-0 relative z-10"
                        onload="document.getElementById('iframe-loader').style.display='none'"></iframe>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function openSandbox(fragmentName) {
        const recipeId = document.getElementById('sandbox-recipe-id').value || 192;
        const theme = document.getElementById('sandbox-theme').value || 'modern';
        const debug = document.getElementById('sandbox-debug').checked;

        let targetUrl = `/admin/media-hub/sandbox/${fragmentName}?recipe_id=${recipeId}&theme=${theme}`;
        if (debug) {
            targetUrl += "&debug=true";
        }

        // Show the iframe and set its src, hide empty state
        const loader = document.getElementById('iframe-loader');
        const container = document.getElementById('sandbox-preview-container');
        const emptyState = document.getElementById('sandbox-empty-state');
        const frame = document.getElementById('sandbox-frame');

        emptyState.style.display = 'none';
        container.style.display = 'flex'; // Use flex since flex-col was on parent, wait actually flex or block is fine, flex-1 applies to it
        loader.style.display = 'flex';
        frame.src = targetUrl;
    }
</script>
{% endblock %}
