{% extends "base.html" %}

{% block title %}Media Hub — Global Media Studio{% endblock %}

{% block content %}
<style>
    @keyframes pulse-dot {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.3;
        }
    }
</style>

<div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
        <div>
            <h1 class="font-serif text-3xl font-bold text-slate-900">🎬 Media Studio</h1>
            <p class="text-sm text-slate-500 mt-1">Generate social media content for your recipes</p>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
            <a href="/admin/media-hub/overview"
                class="rounded-lg border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
                ⚙️ Overview & Workbench
            </a>
            <div class="flex gap-3 flex-wrap">
                <div
                    class="bg-white rounded-xl border border-slate-200 shadow-sm px-4 py-2.5 text-center min-w-[100px]">
                    <div class="text-xl font-bold text-slate-800" id="statTotal">—</div>
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Recipes</div>
                </div>
                <div
                    class="bg-white rounded-xl border border-slate-200 shadow-sm px-4 py-2.5 text-center min-w-[100px]">
                    <div class="text-xl font-bold text-green-600" id="statReady">—</div>
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Ready</div>
                </div>
                <div
                    class="bg-white rounded-xl border border-slate-200 shadow-sm px-4 py-2.5 text-center min-w-[100px]">
                    <div class="text-xl font-bold text-orange-600" id="statPending">—</div>
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Pending</div>
                </div>
            </div>
            </div>
        </div>

        <!-- Recipe Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5" id="mhGrid">
            <div class="col-span-full text-center py-20 text-slate-400">
                <div class="text-5xl mb-4">🎬</div>
                <p class="font-medium">Loading recipes…</p>
            </div>
        </div>

    </div>

    <!-- Video Preview Modal -->
    <div id="mhModal"
        class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-[90%] overflow-hidden">
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                <h3 class="font-serif font-bold text-slate-800 text-lg" id="modalTitle">Preview</h3>
                <button onclick="closeModal()"
                    class="p-1.5 rounded-full text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-5">
                <video id="modalVideo" controls class="w-full rounded-lg"></video>
                <div id="modalScript"
                    class="mt-4 p-3 bg-slate-50 rounded-lg text-sm text-slate-600 max-h-48 overflow-y-auto whitespace-pre-wrap border border-slate-200">
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── State ───────────────────────────────────────────────────────
        let recipesData = [];

        // ── Init ────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', loadRecipes);

        async function loadRecipes() {
            try {
                const res = await fetch('/admin/media-hub/api/recipes');
                recipesData = await res.json();
                renderGrid(recipesData);
                updateStats(recipesData);
            } catch (e) {
                console.error('Failed to load recipes:', e);
            }
        }

        // ── Render ──────────────────────────────────────────────────────
        function renderGrid(recipes) {
            const grid = document.getElementById('mhGrid');

            if (!recipes.length) {
                grid.innerHTML = `
            <div class="col-span-full text-center py-20 text-slate-400">
                <div class="text-5xl mb-4">📚</div>
                <p class="font-medium">No approved recipes found.</p>
            </div>`;
                return;
            }

            grid.innerHTML = recipes.map(r => `
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden hover:shadow-md hover:-translate-y-0.5 transition-all duration-200"
             data-recipe-id="${r.id}">
            <img class="w-full aspect-[16/10] object-cover bg-slate-100"
                 src="${r.image_url || ''}"
                 alt="${r.title}"
                 onerror="this.src=''; this.classList.add('hidden');" />
            <div class="p-4">
                <h3 class="text-sm font-semibold text-slate-800 truncate" title="${r.title}">${r.title}</h3>
                <p class="text-xs text-slate-500 mt-0.5 mb-3">${r.cuisine || 'Unknown'}</p>

                <div class="flex flex-wrap gap-1.5 mb-3">
                    ${renderBadge('TikTok', r.statuses.tiktok)}
                    ${renderBadge('Insta', r.statuses.instagram)}
                </div>

                <div class="flex gap-2">
                    <button class="flex-1 rounded-lg px-3 py-2 text-xs font-semibold transition-all
                                   ${r.statuses.tiktok === 'ready'
                    ? 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                    : 'bg-orange-600 text-white hover:bg-orange-700 shadow-sm'}
                                   disabled:opacity-40 disabled:cursor-not-allowed"
                            onclick="generate(${r.id}, 'tiktok', this)"
                            ${r.statuses.tiktok === 'generating' ? 'disabled' : ''}>
                        ${r.statuses.tiktok === 'ready' ? '👁 View TikTok' : '▶ TikTok'}
                    </button>
                    <button class="flex-1 rounded-lg px-3 py-2 text-xs font-semibold transition-all
                                   ${r.statuses.instagram === 'ready'
                    ? 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                    : 'bg-orange-600 text-white hover:bg-orange-700 shadow-sm'}
                                   disabled:opacity-40 disabled:cursor-not-allowed"
                            onclick="generate(${r.id}, 'instagram', this)"
                            ${r.statuses.instagram === 'generating' ? 'disabled' : ''}>
                        ${r.statuses.instagram === 'ready' ? '👁 View Insta' : '▶ Insta'}
                    </button>
                </div>
            </div>
        </div>
    `).join('');
        }

        function renderBadge(label, status) {
            const s = status || 'none';
            const styles = {
                none: 'bg-slate-100 text-slate-500 ring-1 ring-inset ring-slate-500/10',
                pending: 'bg-orange-50 text-orange-700 ring-1 ring-inset ring-orange-600/20',
                generating: 'bg-blue-50 text-blue-700 ring-1 ring-inset ring-blue-600/20',
                ready: 'bg-green-50 text-green-700 ring-1 ring-inset ring-green-600/20',
                failed: 'bg-red-50 text-red-700 ring-1 ring-inset ring-red-600/20',
            };
            const dotColors = {
                none: 'bg-slate-400', pending: 'bg-orange-500', generating: 'bg-blue-500',
                ready: 'bg-green-500', failed: 'bg-red-500',
            };
            const animate = s === 'generating' ? 'style="animation: pulse-dot 1.2s infinite"' : '';

            return `<span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-medium ${styles[s] || styles.none}">
                <span class="w-1.5 h-1.5 rounded-full ${dotColors[s] || dotColors.none}" ${animate}></span>
                ${label}: ${s}
            </span>`;
        }

        function updateStats(recipes) {
            document.getElementById('statTotal').textContent = recipes.length;

            let ready = 0, pending = 0;
            for (const r of recipes) {
                for (const platform of ['tiktok', 'instagram']) {
                    if (r.statuses[platform] === 'ready') ready++;
                    else if (!r.statuses[platform] || r.statuses[platform] === 'pending') pending++;
                }
            }
            document.getElementById('statReady').textContent = ready;
            document.getElementById('statPending').textContent = pending;
        }

        // ── Generate / View ─────────────────────────────────────────────
        async function generate(recipeId, platform, btn) {
            const recipe = recipesData.find(r => r.id === recipeId);
            if (recipe && recipe.statuses[platform] === 'ready') {
                openPreview(recipeId, platform);
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Generating…';

            try {
                const res = await fetch('/admin/media-hub/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipe_id: recipeId, platform }),
                });

                if (res.status === 202) {
                    pollStatus(recipeId, platform, btn);
                } else {
                    const data = await res.json();
                    alert('Error: ' + (data.error || 'Unknown'));
                    btn.disabled = false;
                    btn.textContent = platform === 'tiktok' ? '▶ TikTok' : '▶ Insta';
                }
            } catch (e) {
                alert('Network error: ' + e.message);
                btn.disabled = false;
            }
        }

        async function pollStatus(recipeId, platform, btn) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/admin/media-hub/api/status/${recipeId}`);
                    const data = await res.json();
                    const postData = data[platform];

                    if (!postData || postData.status === 'generating') return;

                    clearInterval(interval);

                    if (postData.status === 'ready') {
                        const recipe = recipesData.find(r => r.id === recipeId);
                        if (recipe) recipe.statuses[platform] = 'ready';
                        renderGrid(recipesData);
                        updateStats(recipesData);
                    } else if (postData.status === 'failed') {
                        const recipe = recipesData.find(r => r.id === recipeId);
                        if (recipe) recipe.statuses[platform] = 'failed';
                        renderGrid(recipesData);
                    }
                } catch (e) {
                    console.error('Poll error:', e);
                }
            }, 3000);
        }

        // ── Preview Modal ───────────────────────────────────────────────
        async function openPreview(recipeId, platform) {
            try {
                const res = await fetch(`/admin/media-hub/api/status/${recipeId}`);
                const data = await res.json();
                const postData = data[platform];
                if (!postData) return;

                const recipe = recipesData.find(r => r.id === recipeId);
                document.getElementById('modalTitle').textContent =
                    `${recipe ? recipe.title : 'Recipe'} — ${platform.charAt(0).toUpperCase() + platform.slice(1)}`;

                const video = document.getElementById('modalVideo');
                if (postData.video_url) {
                    video.src = postData.video_url;
                    video.style.display = 'block';
                } else {
                    video.style.display = 'none';
                }

                const scriptEl = document.getElementById('modalScript');
                if (postData.script) {
                    try {
                        const parsed = JSON.parse(postData.script);
                        scriptEl.textContent = parsed.voiceover_script || JSON.stringify(parsed, null, 2);
                    } catch {
                        scriptEl.textContent = postData.script;
                    }
                } else {
                    scriptEl.textContent = 'No script available.';
                }

                document.getElementById('mhModal').classList.remove('hidden');
            } catch (e) {
                console.error('Preview error:', e);
            }
        }

        function closeModal() {
            document.getElementById('mhModal').classList.add('hidden');
            document.getElementById('modalVideo').pause();
        }

        document.getElementById('mhModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
    {% endblock %}
